name: Bug report
description: Report a reproducible problem.
title: '[Bug]: '
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or MCP tool call arguments that reproduce the issue. Do not include API keys or private recipient data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: v24.x
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact API keys, email addresses, and account identifiers.
      render: text
